.buttons {
    margin-top: 160px;   /* pushes buttons lower */
}

.buttons a {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    border: 1px solid #94a3b8;
    color: #94a3b8;
    text-decoration: none;
    border-radius: 0;
    transition: all 0.3s ease;
}

.buttons a:hover {
    background: #94a3b8;
    color: #0f172a;
}
