<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiFT</title>

    <!-- Social preview -->
    <meta property="og:title" content="SwiFT">
    <meta property="og:description" content="Fluid Dynamics Research, Development and Consulting">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://swiftflowteam.com">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #cbd5f5;
        }

        .buttons {
            margin-top: 100px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .buttons.show {
            opacity: 1;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border: 1px solid #60a5fa;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .buttons a:hover {
            background: #60a5fa;
            color: #0f172a;
        }

        /* Mobile: always show buttons */
        @media (max-width: 768px) {
            .buttons {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SwiFT</h1>
        <p>Fluid Dynamics Research, Development and Consulting</p>

        <div class="buttons" id="buttons">
            <a href="#">About</a>
            <a href="#">Get in touch</a>
        </div>
    </div>

<script>
    let timeout;

    document.addEventListener("mousemove", function () {
        const buttons = document.getElementById("buttons");

        // Show buttons
        buttons.classList.add("show");

        // Reset timer
        clearTimeout(timeout);

        // Hide after 2 seconds of no movement
        timeout = setTimeout(() => {
            buttons.classList.remove("show");
        }, 2000);
    });
</script>
    
</body>
</html>
