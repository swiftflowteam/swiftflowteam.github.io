<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiFT</title>

    <!-- Social preview -->
    <meta property="og:title" content="SwiFT">
    <meta property="og:description" content="Fluid Dynamics Research, Development and Consulting">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://swiftflowteam.com">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        .logo {
            max-width: 440px;
            margin-bottom: 20px;
            margin-bottom: 20px;
            filter: grayscale(100%) invert(100%) brightness(0.85);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #cbd5f5;
        }

        .buttons {
            margin-top: 140px;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border: 1px solid #94a3b8;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .buttons a:hover {
            background: #94a3b8;
            color: #0f172a;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="vortex.png" alt="SwiFT logo" class="logo">

        <h1>SwiFT</h1>
        <p>Fluid Dynamics Research, Development and Consulting</p>

        <div class="buttons">
            <a href="about.html">About</a>
            <a href="get-in-touch.html">Get in touch</a>
        </div>
    </div>

</html>
